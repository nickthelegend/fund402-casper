    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const sel = '[data-composition-id="scene5-cta"] ';
        const q = (s) => sel + s;
        const tl = gsap.timeline({ paused: true });
        const toEl = document.querySelector(q(".s5-yto"));
        const fmt = (n) => Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        const yv = { v: 2000000 };

        tl.to(q(".s5-glow"), { opacity: 1, duration: 1.2, ease: "power2.out" }, 0.1);

        // yield
        tl.fromTo(q(".s5-ylabel"), { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.4 }, 0.2);
        tl.fromTo(q(".s5-yfrom"), { opacity: 0 }, { opacity: 1, duration: 0.3 }, 0.5);
        tl.fromTo(q(".s5-yarrow"), { opacity: 0 }, { opacity: 1, duration: 0.3 }, 0.7);
        tl.fromTo(q(".s5-yto"), { opacity: 0 }, { opacity: 1, duration: 0.3 }, 0.8);
        tl.to(q(".s5-ybar-base"), { width: "94%", duration: 0.7, ease: "power2.out" }, 0.8);
        tl.to(yv, { v: 2050000, duration: 0.9, ease: "power2.out", onUpdate() { if (toEl) toEl.textContent = fmt(yv.v); } }, 0.9);
        tl.to(q(".s5-ybar-yield"), { width: "6%", duration: 0.5, ease: "power2.out" }, 1.5);
        tl.fromTo(q(".s5-ybadge"), { opacity: 0, scale: 0.6 }, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(2.2)" }, 1.7);
        tl.fromTo(q(".s5-ysub"), { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.4 }, 1.9);

        // ecosystem
        tl.fromTo(q(".s5-ecolabel"), { opacity: 0, y: 12 }, { opacity: 1, y: 0, duration: 0.45, ease: "power2.out" }, 2.4);
        tl.fromTo(q(".s5-chip"), { opacity: 0, y: 26, scale: 0.94 }, { opacity: 1, y: 0, scale: 1, duration: 0.45, stagger: 0.12, ease: "back.out(1.5)" }, 2.7);

        // cta
        tl.fromTo(q(".s5-lockup"), { opacity: 0, y: 24, scale: 0.96 }, { opacity: 1, y: 0, scale: 1, duration: 0.55, ease: "power3.out" }, 4.7);
        tl.fromTo(q(".s5-tagline"), { opacity: 0, y: 12 }, { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }, 5.1);
        tl.fromTo(q(".s5-pill.prime"), { opacity: 0, y: 14 }, { opacity: 1, y: 0, duration: 0.45, ease: "power2.out" }, 5.6);
        tl.fromTo(q(".s5-pill:not(.prime)"), { opacity: 0, y: 14 }, { opacity: 1, y: 0, duration: 0.45, ease: "power2.out" }, 5.8);

        // hold glow pulse
        tl.fromTo(q(".s5-w4"), { filter: "brightness(1)" }, { filter: "brightness(1.25)", duration: 0.8, yoyo: true, repeat: 2, ease: "sine.inOut" }, 6.6);
        tl.to(q(".s5-pill.prime"), { boxShadow: "0 0 36px rgba(245,179,1,0.4)", duration: 0.9, yoyo: true, repeat: 1, ease: "sine.inOut" }, 6.8);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene5-cta"] = tl;
      })();
